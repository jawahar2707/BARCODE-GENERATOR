<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings — Local Label Studio</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Settings</h1>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/designer.html">Label templates</a>
        <a href="/page-templates.html">Page layouts</a>
        <a href="/generate.html">Generate</a>
        <a href="/import.html">Import</a>
        <a href="/history.html">History</a>
        <a href="/settings.html" class="active">Settings</a>
      </nav>
    </header>
    <main>
      <div class="card">
        <h2>Print layout defaults</h2>
        <p class="muted">Margins are from the top-left of the sheet to the first label cell (mm).</p>
        <div class="row">
          <div>
            <label for="paper">Paper</label>
            <select id="paper">
              <option value="A4">A4</option>
              <option value="Letter">US Letter</option>
            </select>
          </div>
          <div>
            <label for="mt">Margin top (mm)</label>
            <input type="number" id="mt" step="0.5" />
          </div>
          <div>
            <label for="ml">Margin left (mm)</label>
            <input type="number" id="ml" step="0.5" />
          </div>
        </div>
        <h2 style="margin-top: 1rem">Export / backup folder</h2>
        <p class="muted">Absolute path on this PC where you prefer exports (PDF also downloads via browser).</p>
        <label for="backup">Path</label>
        <input type="text" id="backup" placeholder="e.g. D:\Labels\exports" />
        <div style="margin-top: 1rem">
          <button type="button" id="save">Save settings</button>
        </div>
        <p id="msg"></p>
      </div>
    </main>
    <script src="/js/api.js"></script>
    <script>
      apiJson('/settings').then((s) => {
        document.getElementById('paper').value = s.default_paper || 'A4';
        document.getElementById('mt').value = s.margin_top_mm || '10';
        document.getElementById('ml').value = s.margin_left_mm || '10';
        document.getElementById('backup').value = s.backup_export_path || '';
      });
      document.getElementById('save').onclick = async () => {
        const msg = document.getElementById('msg');
        msg.textContent = '';
        try {
          await apiJson('/settings', {
            method: 'PUT',
            body: JSON.stringify({
              default_paper: document.getElementById('paper').value,
              margin_top_mm: document.getElementById('mt').value,
              margin_left_mm: document.getElementById('ml').value,
              backup_export_path: document.getElementById('backup').value.trim()
            })
          });
          msg.className = 'ok';
          msg.textContent = 'Saved.';
        } catch (e) {
          msg.className = 'err';
          msg.textContent = e.message;
        }
      };
    </script>
  </body>
</html>
